<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job | Workly</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --pi-purple: #632d95; --pi-gold: #ffa500; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #f4f4f9; 
            padding: 20px;
            color: #333;
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        h2 { 
            color: var(--pi-purple); 
            text-align: center; 
            margin-bottom: 25px;
        }
        label { 
            display: block; 
            margin-top: 20px; 
            font-weight: bold; 
            color: #555; 
        }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1rem;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--pi-purple);
        }
        .fee-box { 
            background: #fff9e6; 
            border: 1px dashed var(--pi-gold); 
            padding: 15px; 
            margin-top: 25px; 
            border-radius: 8px; 
        }
        .fee-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
        }
        .total { 
            font-weight: bold; 
            font-size: 1.2rem; 
            color: var(--pi-purple); 
            border-top: 1px solid #ddd; 
            padding-top: 10px; 
            margin-top: 10px;
        }
        .btn-pay { 
            width: 100%; 
            background: var(--pi-purple); 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 30px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 25px; 
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-pay:hover { 
            background: #4a1f7a; 
        }
        .btn-pay:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            color: #888; 
            text-decoration: none; 
        }
        .error { 
            color: #d32f2f; 
            font-size: 0.9rem; 
            margin-top: 5px; 
            display: none; 
        }
        .sandbox-notice {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            color: #0d47a1;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .sandbox-notice strong {
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Post a New Job</h2>
    
    <!-- Sandbox testing notice -->
    <div class="sandbox-notice">
        <strong>⚠️ SANDBOX MODE</strong><br>
        Payments will expire without backend approval. This is expected for testing.
    </div>
    
    <form id="jobForm" onsubmit="event.preventDefault(); payAndPost();">
        <label for="jobTitle">Job Title *</label>
        <input type="text" id="jobTitle" placeholder="e.g. Design a Logo" required>
        <span class="error" id="titleError">Please enter a job title</span>

        <label for="category">Category</label>
        <select id="category">
            <option value="design">Graphic Design</option>
            <option value="dev">Development</option>
            <option value="writing">Writing & Content</option>
            <option value="marketing">Marketing</option>
            <option value="other">Other</option>
        </select>

        <label for="budget">Budget (Pi) *</label>
        <input type="number" id="budget" value="100" min="1" max="10000" step="0.01" onchange="calculateFees()" required>

        <label for="description">Job Description</label>
        <textarea id="description" rows="4" placeholder="Describe the job requirements..."></textarea>

        <div class="fee-box">
            <div class="fee-row">
                <span>Job Budget:</span>
                <span id="displayBudget">100.00 π</span>
            </div>
            <div class="fee-row">
                <span>Listing Fee (5%):</span>
                <span id="displayFee">5.00 π</span>
            </div>
            <div class="fee-row total">
                <span>Total to Pay:</span>
                <span id="displayTotal">105.00 π</span>
            </div>
        </div>

        <button type="submit" class="btn-pay" id="payBtn">Pay & Post Job</button>
    </form>
    
    <a href="index.html" class="back-link">&larr; Back to Home</a>
</div>

<script>
    // Initialize Pi SDK
    let Pi = null;
    let isPiBrowser = false;

    function initializePiSDK() {
        if (typeof window.Pi !== 'undefined') {
            Pi = window.Pi;
            isPiBrowser = true;
            
            try {
                Pi.init({ 
                    version: "2.0",
                    sandbox: true  // SANDBOX MODE - Payments will expire without backend
                });
                console.log("✅ Pi SDK initialized in sandbox mode");
                return true;
            } catch (err) {
                console.error("❌ Pi SDK initialization failed:", err);
                return false;
            }
        } else {
            console.warn("⚠️ Pi SDK not available - not in Pi Browser");
            return false;
        }
    }

    // Initialize immediately
    initializePiSDK();

    function sanitizeInput(str) {
        if (!str) return '';
        return str.replace(/[<>\"']/g, '').trim().substring(0, 200);
    }

    function calculateFees() {
        const budget = parseFloat(document.getElementById('budget').value) || 0;
        const fee = budget * 0.05;
        const total = budget + fee;

        document.getElementById('displayBudget').textContent = budget.toFixed(2) + " π";
        document.getElementById('displayFee').textContent = fee.toFixed(2) + " π";
        document.getElementById('displayTotal').textContent = total.toFixed(2) + " π";
    }

    async function payAndPost() {
        const titleInput = document.getElementById('jobTitle');
        const budgetInput = document.getElementById('budget');
        const categoryInput = document.getElementById('category');
        const descInput = document.getElementById('description');
        const payBtn = document.getElementById('payBtn');
        
        // Validation
        const title = titleInput.value.trim();
        if (!title) {
            document.getElementById('titleError').style.display = 'block';
            titleInput.focus();
            return;
        }
        document.getElementById('titleError').style.display = 'none';

        const budgetValue = parseFloat(budgetInput.value) || 0;
        if (budgetValue <= 0) {
            alert("Please enter a valid budget");
            return;
        }

        // Check if Pi SDK is available
        if (!isPiBrowser || !Pi) {
            alert("Please open this app in Pi Browser to make payments.");
            return;
        }

        const totalAmount = budgetValue + (budgetValue * 0.05);
        
        // Disable button
        payBtn.disabled = true;
        payBtn.textContent = "Processing...";

        try {
            // Authenticate with Pi
            const scopes = ['payments'];
            
            Pi.authenticate(scopes, function onIncompletePaymentFound(payment) {
                console.log("Incomplete payment found:", payment);
                alert("You have an incomplete payment. Please complete it first.");
            }).then(function(auth) {
                console.log("Authenticated:", auth.user.username);
                
                // Create payment
                return Pi.createPayment({
                    amount: totalAmount,
                    memo: "Workly Job Listing: " + sanitizeInput(title),
                    metadata: { 
                        jobTitle: sanitizeInput(title),
                        category: categoryInput.value,
                        description: sanitizeInput(descInput.value),
                        budget: budgetValue,
                        fee: budgetValue * 0.05,
                        user: auth.user.username
                    }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("⏳ Payment ready for approval:", paymentId);
                        console.log("⚠️ SANDBOX: Payment will expire without backend approval");
                        // In production, send paymentId to your backend here
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        console.log("✅ Payment completed:", paymentId, txid);
                        alert("🎉 Success! Your job has been posted.");
                        document.getElementById('jobForm').reset();
                        calculateFees();
                    },
                    onCancel: function(paymentId) {
                        console.log("❌ Payment cancelled:", paymentId);
                        alert("Payment was cancelled.");
                    },
                    onError: function(error, payment) {
                        console.error("❌ Payment error:", error);
                        alert("Payment failed: " + error.message);
                    }
                });
            }).catch(function(error) {
                console.error("❌ Authentication error:", error);
                alert("Authentication failed: " + error.message);
            });
            
        } catch (err) {
            console.error("❌ Payment error:", err);
            alert("Payment failed. Please ensure you're using Pi Browser.");
        } finally {
            payBtn.disabled = false;
            payBtn.textContent = "Pay & Post Job";
        }
    }

    // Initialize fees on load
    calculateFees();
</script>

</body>
</html>
