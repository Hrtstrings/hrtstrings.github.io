<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job | Workly</title>
    <style>
        :root { --pi-purple: #632d95; --pi-gold: #ffa500; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #f4f4f9; 
            padding: 20px;
            color: #333;
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        h2 { 
            color: var(--pi-purple); 
            text-align: center; 
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        label { 
            display: block; 
            margin-top: 20px; 
            font-weight: bold; 
            color: #555; 
        }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1rem;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--pi-purple);
        }
        .fee-box { 
            background: #fff9e6; 
            border: 1px dashed var(--pi-gold); 
            padding: 15px; 
            margin-top: 25px; 
            border-radius: 8px; 
        }
        .fee-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px; 
        }
        .total { 
            font-weight: bold; 
            font-size: 1.2rem; 
            color: var(--pi-purple); 
            border-top: 1px solid #ddd; 
            padding-top: 10px; 
            margin-top: 10px;
        }
        .btn-pay { 
            width: 100%; 
            background: var(--pi-purple); 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 30px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 25px; 
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-pay:hover { 
            background: #4a1f7a; 
        }
        .btn-pay:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            color: #888; 
            text-decoration: none; 
        }
        .error { 
            color: #d32f2f; 
            font-size: 0.9rem; 
            margin-top: 5px; 
            display: none; 
        }
        /* Payment Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .modal h3 {
            color: var(--pi-purple);
            margin-bottom: 20px;
        }
        .pi-logo {
            width: 80px;
            height: 80px;
            background: var(--pi-purple);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        .payment-details {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }
        .payment-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .payment-total {
            font-weight: bold;
            color: var(--pi-purple);
            font-size: 1.2rem;
            border-top: 2px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-confirm {
            flex: 1;
            background: var(--pi-purple);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-cancel {
            flex: 1;
            background: #f0f0f0;
            color: #666;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        .success-check {
            color: #4caf50;
            font-size: 4rem;
            margin-bottom: 15px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--pi-purple);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Post a New Job</h2>
    <p class="subtitle">Demo Mode - No real Pi transactions</p>
    
    <form id="jobForm" onsubmit="event.preventDefault(); showPaymentModal();">
        <label for="jobTitle">Job Title *</label>
        <input type="text" id="jobTitle" placeholder="e.g. Design a Logo" required>
        <span class="error" id="titleError">Please enter a job title</span>

        <label for="category">Category</label>
        <select id="category">
            <option value="design">Graphic Design</option>
            <option value="dev">Development</option>
            <option value="writing">Writing & Content</option>
            <option value="marketing">Marketing</option>
            <option value="other">Other</option>
        </select>

        <label for="budget">Budget (Pi) *</label>
        <input type="number" id="budget" value="100" min="1" max="10000" step="0.01" onchange="calculateFees()" required>

        <label for="description">Job Description</label>
        <textarea id="description" rows="4" placeholder="Describe the job requirements..."></textarea>

        <div class="fee-box">
            <div class="fee-row">
                <span>Job Budget:</span>
                <span id="displayBudget">100.00 π</span>
            </div>
            <div class="fee-row">
                <span>Listing Fee (5%):</span>
                <span id="displayFee">5.00 π</span>
            </div>
            <div class="fee-row total">
                <span>Total to Pay:</span>
                <span id="displayTotal">105.00 π</span>
            </div>
        </div>

        <button type="submit" class="btn-pay" id="payBtn">Pay & Post Job</button>
    </form>
    
    <a href="index.html" class="back-link">&larr; Back to Home</a>
</div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal-overlay">
    <div class="modal" id="modalContent">
        <!-- Content injected by JS -->
    </div>
</div>

<script>
    // Calculate fees
    function calculateFees() {
        const budget = parseFloat(document.getElementById('budget').value) || 0;
        const fee = budget * 0.05;
        const total = budget + fee;

        document.getElementById('displayBudget').textContent = budget.toFixed(2) + " π";
        document.getElementById('displayFee').textContent = fee.toFixed(2) + " π";
        document.getElementById('displayTotal').textContent = total.toFixed(2) + " π";
        
        return { budget, fee, total };
    }

    // Show payment confirmation modal
    function showPaymentModal() {
        const title = document.getElementById('jobTitle').value.trim();
        if (!title) {
            document.getElementById('titleError').style.display = 'block';
            return;
        }
        document.getElementById('titleError').style.display = 'none';

        const fees = calculateFees();
        const modal = document.getElementById('paymentModal');
        const content = document.getElementById('modalContent');
        
        content.innerHTML = `
            <div class="pi-logo">π</div>
            <h3>Confirm Payment</h3>
            <p style="color: #666; margin-bottom: 20px;">Workly Job Listing</p>
            
            <div class="payment-details">
                <div class="payment-row">
                    <span>Job:</span>
                    <span>${escapeHtml(title)}</span>
                </div>
                <div class="payment-row">
                    <span>Budget:</span>
                    <span>${fees.budget.toFixed(2)} π</span>
                </div>
                <div class="payment-row">
                    <span>Listing Fee:</span>
                    <span>${fees.fee.toFixed(2)} π</span>
                </div>
                <div class="payment-row payment-total">
                    <span>Total:</span>
                    <span>${fees.total.toFixed(2)} π</span>
                </div>
            </div>
            
            <p style="color: #999; font-size: 0.85rem; margin-top: 15px;">
                Demo Mode - No real Pi will be transferred
            </p>
            
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="processPayment()">Confirm</button>
            </div>
        `;
        
        modal.style.display = 'flex';
    }

    // Process mock payment
    function processPayment() {
        const content = document.getElementById('modalContent');
        const fees = calculateFees();
        
        // Show processing state
        content.innerHTML = `
            <div class="spinner"></div>
            <h3>Processing Payment...</h3>
            <p style="color: #666;">Please wait while we process your ${fees.total.toFixed(2)} π payment</p>
        `;
        
        // Simulate processing delay
        setTimeout(() => {
            // Show success
            content.innerHTML = `
                <div class="success-check">✓</div>
                <h3>Payment Successful!</h3>
                <p style="color: #666; margin-bottom: 20px;">
                    Your job has been posted successfully.
                </p>
                <div class="payment-details" style="text-align: center;">
                    <p style="margin: 0; color: #666;">Amount Paid</p>
                    <p style="margin: 5px 0; font-size: 1.5rem; color: var(--pi-purple); font-weight: bold;">
                        ${fees.total.toFixed(2)} π
                    </p>
                </div>
                <button class="btn-confirm" style="margin-top: 20px; width: 100%;" onclick="finishPayment()">
                    Done
                </button>
            `;
        }, 2000);
    }

    // Close modal and reset form
    function finishPayment() {
        closeModal();
        document.getElementById('jobForm').reset();
        calculateFees();
    }

    // Close modal
    function closeModal() {
        document.getElementById('paymentModal').style.display = 'none';
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Initialize
    calculateFees();
</script>

</body>
    </html>
